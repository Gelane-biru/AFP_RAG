<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h1 {
      text-align: center;
      color: #4a6fa5;
      margin-bottom: 20px;
    }
    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #ddd;
      border-radius: 5px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      background: #4a6fa5;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover {
      background: #3c5c8c;
    }
    .toggle-password {
      position: absolute;
      right: 20px;
      top: 48%;
      cursor: pointer;
      color: #999;
    }
    .input-group {
      position: relative;
    }
    .link {
      text-align: center;
      margin-top: 15px;
    }
    .link a {
      color: #4a6fa5;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Login</h1>
  <input type="email" id="email" placeholder="Email" />

  <div class="input-group">
    <input type="password" id="password" placeholder="Password" />
    <span class="toggle-password" onclick="togglePassword()">👁️</span>
  </div>

  <button onclick="login()">Login</button>

  <div class="link">
    <p>Don't have an account? <a href="../signup/index.html">Sign up</a></p>
  </div>
</div>

<script type="module">
  import { supabase } from '../supabase.js'; // adjust if your path differs

  async function login() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
      alert('Please fill in both fields.');
      return;
    }

    const { data, error } = await supabase.auth.signInWithPassword({
      email,
      password,
    });

    if (error) {
      alert('Login error: ' + error.message);
      console.error(error);
      return;
    }

    alert('Login successful!');
    window.location.href = 'http://127.0.0.1:8000/static/chat-afp/index.html'; // adjust to your dashboard page
  }

  window.login = login;

  window.togglePassword = function() {
    const field = document.getElementById('password');
    field.type = field.type === 'password' ? 'text' : 'password';
  }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Polio Virus Query Dashboard</title>
  <link rel="icon" href="data:,">
  <!-- Inter font from Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Chart.js CDN with local fallback -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    // Fallback if CDN fails
    if (typeof Chart === 'undefined') {
      document.write('<script src="./chart.min.js"><\/script>');
    }
  </script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="content-loading">
  <div class="loading-overlay">
    <div>
      <div class="loader">
        <div class="circle">
          <div class="dot"></div>
          <div class="outline"></div>
        </div>
        <div class="circle">
          <div class="dot"></div>
          <div class="outline"></div>
        </div>
        <div class="circle">
          <div class="dot"></div>
          <div class="outline"></div>
        </div>
        <div class="circle">
          <div class="dot"></div>
          <div class="outline"></div>
        </div>
      </div>
      <div class="loading-text">Processing Polio Data...</div>
    </div>
  </div>

  <h1>Polio Virus Query Dashboard</h1>

  <div class="dashboard-container">
    <div class="sidebar">
      <div class="filter-container">
        <h3>Analysis</h3>
        <label for="sortField">Sort By</label>
        <select id="sortField">
          <option value="time">Time</option>
          <option value="email">Email</option>
          <option value="query">Query</option>
        </select>
        <label for="sortOrder">Order</label>
        <select id="sortOrder">
          <option value="asc">Ascending</option>
          <option value="desc">Descending</option>
        </select>
        <label for="activityFilter">User Activity</label>
        <select id="activityFilter">
          <option value="all">All Users</option>
          <option value="high">High Query Users</option>
          <option value="low">Low Query Users</option>
        </select>
        <label for="queryFilter">Query Filter</label>
        <input type="text" id="queryFilter" placeholder="Filter by Query">
        <label for="startDate">Start Date</label>
        <input type="date" id="startDate" placeholder="Start Date">
        <label for="endDate">End Date</label>
        <input type="date" id="endDate" placeholder="End Date">
        <button id="resetFilters">Reset Filters</button>
      </div>
    </div>

    <div class="main-content">
      <div class="chart-container">
        <canvas id="queriesChart"></canvas>
      </div>
      <div class="btn-container">
        <select id="chartTypeSelect">
          <option value="line">Line Chart</option>
          <option value="bar">Bar Chart</option>
          <option value="pie">Pie Chart</option>
          <option value="doughnut">Doughnut Chart</option>
        </select>
        <button id="exportBtn">Export Table to CSV</button>
      </div>
      <div class="table-container">
        <table id="queryTable">
          <thead>
            <tr>
              <th>#</th>
              <th>Email</th>
              <th>Query</th>
              <th>Time</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <div class="pagination-container">
        <div class="pagination-buttons">
          <button id="prevPage">Previous</button>
          <button id="nextPage">Next</button>
          <select id="rowsPerPage">
            <option value="10">10 rows</option>
            <option value="25">25 rows</option>
            <option value="50">50 rows</option>
            <option value="100">100 rows</option>
          </select>
        </div>
        <span id="pageInfo"></span>
      </div>
      <div class="analysis-section">
        <div class="analysis-container">
          <h3>Top Keywords Analysis</h3>
          <ul class="keyword-list" id="topQueriesList"></ul>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>

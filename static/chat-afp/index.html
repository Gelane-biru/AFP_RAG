<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFP AI Chatbot</title>
    <script defer src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="userux.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <button class="sidebar-toggle" onclick="toggleSidebar()" title="Toggle Sidebar">
            <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="header-title">AFP Assistant</span>
            </div>
            <div class="sidebar-content">
                <button class="new-chat-btn" onclick="startNewChat()" title="Start New Chat">
                    <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 20h9M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
                    </svg>
                    <span>New Chat</span>
                </button>
                <div class="chat-history">
                    <div id="chatHistory" class="history-dropdown-content"></div>
                </div>
                <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Theme">
                    <svg id="theme-icon" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 8a4 4 0 0 0-4 4 4 4 0 0 0 4 4 4 4 0 0 0 4-4 4 4 0 0 0-4-4zm0 0v-4m0 12v4m-4-4h-4m12 0h4m-2.83-2.83l2.83-2.83m-9.66 9.66l-2.83-2.83m2.83-9.66l2.83-2.83m-9.66 9.66l-2.83 2.83"/>
                    </svg>
                    <span>Toggle Theme</span>
                </button>
            </div>
        </aside>
        <main class="main-content">
            <div id="chatContainer" class="chat-container">
                <div class="welcome-section">
                    <h1 class="welcome-header">AFP AI Assistant</h1>
                    <p class="welcome-subheader">Your trusted source for polio information and prevention</p>
                </div>
            </div>
            <div id="loading" class="hidden chat-loading">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
            <div id="inputContainer" class="input-container">
                <div class="input-wrapper">
                    <textarea id="queryInput" placeholder="Ask about polio..." class="flex-grow bg-transparent border-none outline-none text-gray-800 text-base placeholder-gray-500 focus:ring-0 resize-none"></textarea>
                    <button id="submitButton" class="submit-btn flex items-center justify-center w-10 h-10 bg-blue-600 rounded-full hover:bg-blue-700 transition-colors duration-200">
                        <svg class="h-5 w-5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M5 12h14M12 5l7 7-7 7"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div id="errorMessage" class="hidden fixed bottom-2 left-1/2 transform -translate-x-1/2 bg-red-500 text-white px-4 py-2 rounded-lg shadow-lg text-sm"></div>
        </main>
    </div>
    <script src="userux.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@4.0.0/marked.min.js"></script>
    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('active');
        }
        // Auto-resize textarea based on content
        const textarea = document.getElementById('queryInput');
        textarea.addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = `${Math.min(this.scrollHeight, 120)}px`; // Max height of 120px
        });
    </script>
</body>
</html>

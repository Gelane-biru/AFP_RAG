<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>All Users - Overview</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="content-loading">
  <div class="loading-overlay">
    <div>
      <div class="loader">
        <div class="circle"><div class="dot"></div><div class="outline"></div></div>
        <div class="circle"><div class="dot"></div><div class="outline"></div></div>
        <div class="circle"><div class="dot"></div><div class="outline"></div></div>
      </div>
      <div class="loading-text">Loading User Data...</div>
    </div>
  </div>

  <h1>All Users - Overview</h1>

  <div class="filter-bar">
    <div class="filter-group">
      <label for="sortField">Sort By</label>
      <select id="sortField">
        <option value="name">Name</option>
        <option value="email">Email</option>
      </select>
    </div>
    <div class="filter-group">
      <label for="sortOrder">Order</label>
      <select id="sortOrder">
        <option value="asc">Ascending</option>
        <option value="desc">Descending</option>
      </select>
    </div>
    <div class="filter-group">
      <label for="timeRangeSelect">Time Range</label>
      <select id="timeRangeSelect">
        <option value="all" selected>All Time</option>
        <option value="day">Last Day</option>
        <option value="week">Last Week</option>
        <option value="month">Last Month</option>
        <option value="3month">Last 3 Months</option>
        <option value="6month">Last 6 Months</option>
        <option value="year">Last Year</option>
      </select>
    </div>
    <div class="filter-group">
      <label for="startDate">Start Date</label>
      <input type="date" id="startDate" placeholder="Start Date">
    </div>
    <div class="filter-group">
      <label for="endDate">End Date</label>
      <input type="date" id="endDate" placeholder="End Date">
    </div>
    <div class="filter-group">
      <label for="resetFilters">Reset</label>
      <button id="resetFilters">Reset Filters</button>
    </div>
    <div class="filter-group">
      <label for="chartTypeSelect">Chart Type</label>
      <select id="chartTypeSelect">
        <option value="line">Line Chart</option>
        <option value="bar">Bar Chart</option>
      </select>
    </div>
    <div class="filter-group">
      <label for="graphViewSelect">Graph View</label>
      <select id="graphViewSelect">
        <option value="year" selected>Year</option>
        <option value="month">Month</option>
        <option value="week">Week</option>
        <option value="day">Day</option>
      </select>
    </div>
    <div class="filter-group">
      <label for="exportBtn">Export</label>
      <button id="exportBtn">Export to CSV</button>
    </div>
  </div>

  <div class="dashboard-content">
    <div class="chart-container">
      <canvas id="usersChart"></canvas>
    </div>
    <div class="table-container">
      <table id="usersTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Email</th>
            <th>Created At</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <div class="pagination-container">
        <button id="prevPage">Previous</button>
        <button id="nextPage">Next</button>
        <select id="rowsPerPage">
          <option value="10">10 rows</option>
          <option value="25">25 rows</option>
          <option value="50">50 rows</option>
          <option value="100">100 rows</option>
        </select>
        <span id="pageInfo"></span>
      </div>
    </div>
  </div>

  <div class="modal" id="editModal">
    <div class="modal-content">
      <span class="close" id="closeModal">×</span>
      <h2>Edit User</h2>
      <input type="hidden" id="editUserId">
      <div class="filter-group">
        <label for="editName">Name</label>
        <input type="text" id="editName" placeholder="Name">
      </div>
      <div class="filter-group">
        <label for="editEmail">Email</label>
        <input type="text" id="editEmail" placeholder="Email">
      </div>
      <div class="filter-group">
        <label for="editCreatedAt">Created At</label>
        <input type="date" id="editCreatedAt" placeholder="Created At">
      </div>
      <button id="saveEdit">Save</button>
      <button id="cancelEdit">Cancel</button>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
